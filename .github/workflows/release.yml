name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      # - name: Import GPG key
      #   uses: crazy-max/ghaction-import-gpg@v6
      #   id: import_gpg
      #   with:
      #     gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
      #     passphrase: ${{ secrets.PASSPHRASE }}

      - name: Import GPG key
        id: import_gpg
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import

          # Enable loopback pinentry
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpgconf --kill gpg-agent

          # Extract fingerprint
          FINGERPRINT=$(gpg --list-secret-keys --with-colons | grep '^fpr' | head -n1 | cut -d: -f10)
          echo "fingerprint=$FINGERPRINT" >> $GITHUB_OUTPUT

      - name: Write GPG passphrase to file
        env:
          PASSPHRASE: ${{ secrets.PASSPHRASE }}
        run: echo "$PASSPHRASE" > /tmp/gpg_passphrase.txt

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
          GPG_PASSPHRASE_FILE: /tmp/gpg_passphrase.txt
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Clean up passphrase file
        if: always()
        run: rm -f /tmp/gpg_passphrase.txt
