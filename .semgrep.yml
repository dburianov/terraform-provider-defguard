rules:
  - id: hardcoded-secrets
    patterns:
      - pattern: |
          "-----BEGIN PRIVATE KEY-----"
      - pattern: |
          "-----BEGIN RSA PRIVATE KEY-----"
      - pattern: |
          "-----BEGIN PGP PRIVATE KEY BLOCK-----"
    message: "Hardcoded private key detected"
    severity: ERROR
    languages: [ go ]

  - id: weak-crypto
    patterns:
      - pattern: crypto.MD5
      - pattern: crypto.SHA1
    message: "Weak cryptographic algorithm detected"
    severity: WARNING
    languages: [ go ]

  - id: sensitive-data-logging
    patterns:
      - pattern-either:
          - pattern: log.Printf($X, ..., $SENSITIVE, ...)
          - pattern: fmt.Printf($X, ..., $SENSITIVE, ...)
      - metavariable-pattern:
          metavariable: $SENSITIVE
          pattern-either:
            - pattern: $VAR.content
            - pattern: $VAR.result
    message: "Potential sensitive data logging"
    severity: WARNING
    languages: [ go ]
